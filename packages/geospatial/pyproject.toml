[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "transport-geospatial"
version = "0.1.0"
description = "Geocoding and distance matrix utilities for transport coordination"
license = "Apache-2.0"
requires-python = ">=3.12"
dependencies = [
    "httpx>=0.28",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "ruff>=0.8",
]

[tool.hatch.build.targets.wheel]
packages = ["src/transport_geospatial"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.pytest.ini_options]
testpaths = ["tests"]
