[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "transport-solver"
version = "0.1.0"
description = "VRP solver for film production transport coordination"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.12"
dependencies = [
    "ortools>=9.10",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "ruff>=0.8",
]

[tool.hatch.build.targets.wheel]
packages = ["src/transport_solver"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.pytest.ini_options]
testpaths = ["tests"]
