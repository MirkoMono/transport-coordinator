name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install packages
        run: |
          pip install -e "packages/solver[dev]"
          pip install -e "packages/geospatial[dev]"
          pip install -e "packages/ai[dev]"
          pip install -e "apps/api[dev]"

      - name: Ruff (solver)
        run: ruff check packages/solver

      - name: Ruff (api)
        run: ruff check apps/api

      - name: Ruff (geospatial)
        run: ruff check packages/geospatial

      - name: Ruff (ai)
        run: ruff check packages/ai

      - name: Test solver
        run: pytest packages/solver -q

      - name: Test geospatial
        run: pytest packages/geospatial -q

      - name: Test AI
        run: pytest packages/ai -q

      - name: Test API
        run: pytest apps/api -q

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
