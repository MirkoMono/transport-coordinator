services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: transport
      POSTGRES_PASSWORD: transport
      POSTGRES_DB: transport
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U transport -d transport"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://transport:transport@postgres:5432/transport
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://localhost:5173
      AI_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
