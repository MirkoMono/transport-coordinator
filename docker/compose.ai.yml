# Optional Ollama + Gemma profile for AI call-sheet parsing.
# Usage:
#   docker compose -f docker/compose.yml -f docker/compose.ai.yml --profile ai up -d
#   docker compose -f docker/compose.yml -f docker/compose.ai.yml exec ollama ollama pull gemma2:2b

services:
  ollama:
    image: ollama/ollama:latest
    profiles: ["ai"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        limits:
          memory: 4G
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  api:
    profiles: ["ai"]
    environment:
      AI_ENABLED: "true"
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: gemma2:2b
    depends_on:
      ollama:
        condition: service_healthy

volumes:
  ollama_data:
